synergies:
  - id: 1
    name: 그리스
    maxStack: 6
    description: 전투 시작 시 주변에 있는 그리스 소속의 유닛만큼 고정 방어막을 획득하며 모든 소속 유닛은 방어막을 보유하면 가하는 피해가 증가한다.
  - id: 2
    name: 다르마
    maxStack: 6
    description: 모든 다르마 아군은 배치 시 다르마 시너지가 활성화되어 있다면 추가로 다르마 패시브를 획득한다.
  - id: 3
    name: 노르드
    maxStack: 6
    description: 모든 노르드 소속 유닛은 체력 비율에 반비례하여 가하는 피해가 증가한다. 추가로 체력 비율이 30% 이하라면 가하는 피해의 15%만큼 체력을 회복한다.
  - id: 4
    name: 타카미가하라
    maxStack: 6
    description: 타카미가하라 진영 시너지 효과입니다.
  - id: 5
    name: 메소포타미아
    maxStack: 6
    description: 시너지가 활성화되면 하나의 랜덤 셀이 변화하며 해당 위치에 배치된 메소포타미아 소속 유닛은 전투가 끝날 때까지 생존했다면 영구적으로 공격력을 획득한다.
  - id: 6
    name: 아카샤
    maxStack: 2
    description: 아카샤 진영 시너지 효과입니다.
  - id: 7
